site_name: gpconfig
site_description: A type-safe, YAML-based configuration management library built on Pydantic
site_url: https://LinnetCodes.github.io/gpconfig/
repo_url: https://github.com/LinnetCodes/gpconfig
repo_name: LinnetCodes/gpconfig
edit_uri: edit/mkdocs_pre_publish/docs/
copyright: Copyright &copy; 2024 HAN Lin

theme:
  name: material
  language: en
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.top
    - search.suggest
    - search.highlight
    - content.code.copy

plugins:
  - i18n:
      docs_structure: folder
      languages:
        - locale: en
          name: English
          default: true
        - locale: zh
          name: 简体中文
          build: true

nav:
  - Home: index.md
  - API:
    - GPConfig: gpconfig.md
    - GPConfigurable: configurable.md
    - GPConfigManager: manager.md
    - Exceptions: exceptions.md

markdown_extensions:
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.superfences
